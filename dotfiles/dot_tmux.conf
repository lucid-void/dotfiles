# ── Prefix ─────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g mouse on
set -sg escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Key bindings ───────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Status bar ─────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#24273a,fg=#cad3f5"
set -g status-left "#[fg=#24273a,bg=#8aadf4,bold] #S #[fg=#8aadf4,bg=#24273a]"
set -g status-right "#[fg=#363a4f,bg=#24273a]#[fg=#cad3f5,bg=#363a4f] %H:%M #[fg=#8aadf4,bg=#363a4f]#[fg=#24273a,bg=#8aadf4,bold] #h "
set -g status-left-length 30
set -g status-right-length 50

setw -g window-status-format "#[fg=#6e738d,bg=#24273a] #I:#W "
setw -g window-status-current-format "#[fg=#24273a,bg=#c6a0f6]#[fg=#24273a,bg=#c6a0f6,bold] #I:#W #[fg=#c6a0f6,bg=#24273a]"

# ── Copy mode (vi) ─────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
