# Catppuccin Macchiato palette
palette = "catppuccin_macchiato"

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo  = "#f0c6c6"
pink      = "#f5bde6"
mauve     = "#c6a0f6"
red       = "#ed8796"
maroon    = "#ee99a0"
peach     = "#f5a97f"
yellow    = "#eed49f"
green     = "#a6da95"
teal      = "#8bd5ca"
sky       = "#91d7e3"
sapphire  = "#7dc4e4"
blue      = "#8aadf4"
lavender  = "#b7bdf8"
text      = "#cad3f5"
subtext1  = "#b8c0e0"
subtext0  = "#a5adcb"
overlay2  = "#939ab7"
overlay1  = "#8087a2"
overlay0  = "#6e738d"
surface2  = "#5b6078"
surface1  = "#494d64"
surface0  = "#363a4f"
base      = "#24273a"
mantle    = "#1e2030"
crust     = "#181926"

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$fill\
$c\
$rust\
$golang\
$nodejs\
$python\
$terraform\
$docker_context\
$cmd_duration\
$time\
$line_break\
$character"""

[os]
disabled = false
style    = "bold blue"

[os.symbols]
Linux   = " "
Ubuntu  = " "
Debian  = " "
Fedora  = " "
Alpine  = " "
Arch    = " "
Windows = " "
Macos   = " "

[username]
show_always = false
format      = "[$user]($style) "
style_user  = "bold blue"
style_root  = "bold red"

[hostname]
ssh_only = true
format   = "[@$hostname]($style) "
style    = "bold green"

[directory]
style              = "bold sapphire"
truncation_length  = 4
truncate_to_repo   = true
substitutions      = { "~/Downloads" = " ", "~/Music" = "¾░ØÜ ", "~/Developer" = "¾░▓ŗ ", "~/Documents" = " ", "~/Pictures" = " " }

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style  = "bold mauve"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style  = "bold yellow"

[git_status]
format      = "([$all_status$ahead_behind]($style) )"
style       = "bold red"
ahead       = "ŌćĪ${count}"
behind      = "ŌćŻ${count}"
diverged    = "ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count}"
untracked   = "?${count}"
modified    = "!${count}"
staged      = "+${count}"
deleted     = "Ō£ś${count}"
stashed     = "\\$${count}"

[fill]
symbol = " "

[c]
symbol = " "
style  = "bold overlay2"
format = "[$symbol($version)]($style) "

[rust]
symbol = " "
style  = "bold peach"
format = "[$symbol($version)]($style) "

[golang]
symbol = " "
style  = "bold sky"
format = "[$symbol($version)]($style) "

[nodejs]
symbol = " "
style  = "bold green"
format = "[$symbol($version)]($style) "

[python]
symbol   = " "
style    = "bold yellow"
format   = "[$symbol$pyenv_prefix($version)(\\($virtualenv\\))]($style) "

[php]
symbol = " "
style  = "bold overlay2"
format = "[$symbol($version)]($style) "

[java]
symbol = " "
style  = "bold red"
format = "[$symbol($version)]($style) "

[kotlin]
symbol = " "
style  = "bold mauve"
format = "[$symbol($version)]($style) "

[haskell]
symbol = " "
style  = "bold mauve"
format = "[$symbol($version)]($style) "

[terraform]
symbol = "¾▒üó "
style  = "bold mauve"
format = "[$symbol$workspace]($style) "

[docker_context]
symbol = " "
style  = "bold blue"
format = "[$symbol$context]($style) "
only_with_files = true

[cmd_duration]
min_time = 2000
format   = "[$duration]($style) "
style    = "bold yellow"

[time]
disabled    = false
format      = "[$time]($style) "
style       = "bold overlay1"
time_format = "%H:%M"

[character]
success_symbol = "[ŌØ»](bold green)"
error_symbol   = "[ŌØ»](bold red)"
vimcmd_symbol  = "[ŌØ«](bold mauve)"
